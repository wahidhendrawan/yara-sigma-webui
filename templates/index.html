<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YARA to Sigma Workbench</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1115;--panel:#171a21;--panel2:#20242d;--ink:#f4f0e8;--muted:#a8a29a;
  --line:#313640;--accent:#d78b30;--accent2:#3aa98f;--bad:#e05f5f;--warn:#d6aa3d;--good:#54b876;
}
body{font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:linear-gradient(135deg,#0f1115 0%,#14161b 52%,#101816 100%);color:var(--ink);line-height:1.45}
button,select,textarea{font:inherit}
button{cursor:pointer}
.top{border-bottom:1px solid var(--line);padding:18px 22px;display:flex;justify-content:space-between;gap:16px;align-items:center}
.brand h1{font-size:1.15rem;font-weight:800;letter-spacing:0}
.brand p{color:var(--muted);font-size:.82rem;margin-top:2px}
.status{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.pill{border:1px solid var(--line);background:rgba(255,255,255,.03);border-radius:999px;padding:5px 9px;color:var(--muted);font-size:.75rem}
.pill.good{color:var(--good);border-color:rgba(84,184,118,.35)}
.pill.warn{color:var(--warn);border-color:rgba(214,170,61,.35)}
.pill.bad{color:var(--bad);border-color:rgba(224,95,95,.35)}
.shell{height:calc(100vh - 75px);display:grid;grid-template-columns:minmax(360px,42%) 1fr}
.pane{min-width:0;padding:18px;border-right:1px solid var(--line);overflow:auto}
.pane:last-child{border-right:0}
.label{display:flex;justify-content:space-between;align-items:center;color:var(--muted);font-size:.72rem;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
textarea{width:100%;height:calc(100vh - 230px);min-height:360px;background:#0b0d11;color:var(--ink);border:1px solid var(--line);border-radius:7px;padding:14px;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:.84rem;resize:vertical;line-height:1.5}
textarea:focus,select:focus{outline:1px solid var(--accent)}
.controls{display:grid;grid-template-columns:1fr 1fr auto;gap:10px;margin:12px 0}
select,.btn{background:var(--panel2);color:var(--ink);border:1px solid var(--line);border-radius:7px;padding:9px 11px}
.btn{font-weight:700}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#17100a}
.btn:disabled{opacity:.55;cursor:not-allowed}
.samples{display:flex;gap:7px;flex-wrap:wrap}
.sample{font-size:.76rem;color:var(--muted);background:transparent;border:1px solid var(--line);border-radius:999px;padding:5px 9px}
.tabs{display:flex;align-items:center;gap:6px;border-bottom:1px solid var(--line);margin-bottom:12px}
.tab{background:transparent;border:0;color:var(--muted);padding:9px 12px;border-bottom:2px solid transparent}
.tab.active{color:var(--ink);border-color:var(--accent2)}
.actions{margin-left:auto;display:flex;gap:8px;padding-bottom:6px}
.out{background:#0b0d11;border:1px solid var(--line);border-radius:7px;padding:14px;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:.82rem;white-space:pre-wrap;word-break:break-word;min-height:calc(100vh - 250px);max-height:calc(100vh - 250px);overflow:auto}
.report{font-family:inherit;list-style:none}
.report li{padding:8px 0;border-bottom:1px solid rgba(255,255,255,.06);color:#d7d0c6;font-size:.84rem}
.meta{display:grid;grid-template-columns:repeat(4,minmax(120px,1fr));gap:8px;margin-bottom:12px}
.metric{border:1px solid var(--line);border-radius:7px;background:rgba(255,255,255,.025);padding:9px 10px;min-width:0}
.metric span{display:block;color:var(--muted);font-size:.68rem;text-transform:uppercase;letter-spacing:.08em}
.metric strong{display:block;margin-top:3px;font-size:.88rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.err{display:none;margin-bottom:12px;border:1px solid rgba(224,95,95,.38);color:#ffd3d3;background:rgba(224,95,95,.08);padding:10px;border-radius:7px;font-size:.86rem}
.hidden{display:none}
@media(max-width:900px){
  .top{display:block}
  .status{justify-content:flex-start;margin-top:10px}
  .shell{height:auto;display:block}
  .pane{border-right:0;border-bottom:1px solid var(--line)}
  textarea,.out{height:auto;min-height:320px;max-height:none}
  .controls{grid-template-columns:1fr}
  .meta{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<header class="top">
  <div class="brand">
    <h1>YARA to Sigma Workbench</h1>
    <p>yar2sig v3</p>
  </div>
  <div class="status" id="status">
    <span class="pill">Idle</span>
  </div>
</header>

<main class="shell">
  <section class="pane">
    <div class="label"><span>Source Rule</span><span id="charCount">0 bytes</span></div>
    <textarea id="rule" placeholder="Paste YARA rule..." spellcheck="false"></textarea>
    <div class="controls">
      <select id="pipeline" title="Mapping pipeline">
        {% for p in pipelines %}<option value="{{p}}">{{p}}</option>{% endfor %}
      </select>
      <select id="backend" title="SIEM backend">
        {% for k,v in backends.items() %}<option value="{{k}}">{{v}}</option>{% endfor %}
      </select>
      <button class="btn primary" id="convertBtn" onclick="doConvert()">Convert</button>
    </div>
    <div class="samples">
      <button class="sample" onclick="loadSample('basic')">Basic</button>
      <button class="sample" onclick="loadSample('c2')">C2</button>
      <button class="sample" onclick="loadSample('complex')">Complex</button>
      <button class="sample" onclick="loadSample('hash')">Hash</button>
    </div>
  </section>

  <section class="pane">
    <div class="tabs">
      <button class="tab active" data-tab="sigma" onclick="switchTab('sigma')">Sigma</button>
      <button class="tab" data-tab="query" onclick="switchTab('query')">Query</button>
      <button class="tab" data-tab="report" onclick="switchTab('report')">Report</button>
      <div class="actions">
        <button class="btn" id="copyBtn" onclick="copyOut()">Copy</button>
        <button class="btn" onclick="download()">Download</button>
      </div>
    </div>
    <div class="err" id="err"></div>
    <div class="meta">
      <div class="metric"><span>Confidence</span><strong id="metricConfidence">-</strong></div>
      <div class="metric"><span>Patterns</span><strong id="metricPatterns">-</strong></div>
      <div class="metric"><span>Review</span><strong id="metricReview">-</strong></div>
      <div class="metric"><span>Rule</span><strong id="metricRule">-</strong></div>
    </div>
    <pre class="out" id="out-sigma">Conversion output will appear here.</pre>
    <pre class="out hidden" id="out-query"></pre>
    <ul class="out report hidden" id="out-report"></ul>
  </section>
</main>

<script>
const SAMPLES = {
  basic: `rule SuspiciousExecutable : malware {\n  meta:\n    author = "analyst"\n    description = "Detects suspicious dropper"\n    reference = "T1059.003"\n  strings:\n    $a = "cmd.exe /c"\n    $b = "powershell -enc" nocase\n  condition:\n    any of them\n}`,
  c2: `rule C2Beacon {\n  meta:\n    description = "Detects C2 beacon traffic"\n  strings:\n    $url = "http://malicious-c2.example.com/gate.php"\n    $ip  = "185.220.101.45"\n    $ua  = "Mozilla/4.0 (compatible; MSIE)"\n  condition:\n    all of them\n}`,
  complex: `rule ComplexCondition {\n  strings:\n    $a1 = "rundll32.exe"\n    $a2 = "regsvr32.exe"\n    $b = /powershell\\\\s+-e(nc)?/ nocase\n  condition:\n    1 of ($a*) and $b\n}`,
  hash: `rule KnownMalwareHash {\n  meta:\n    description = "Detects known malware by hash and path"\n  strings:\n    $h = "44d88612fea8a8f36de82e1278abb02f"\n    $p = "C:\\\\Users\\\\Public\\\\evil.exe"\n  condition:\n    any of them\n}`
};
let current = 'sigma';
let lastSigma = '';

function esc(value){
  return String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}
function loadSample(key){
  document.getElementById('rule').value = SAMPLES[key];
  updateCount();
}
function switchTab(tab){
  current = tab;
  document.querySelectorAll('.tab').forEach(btn => btn.classList.toggle('active', btn.dataset.tab === tab));
  ['sigma','query','report'].forEach(name => document.getElementById('out-' + name).classList.toggle('hidden', name !== tab));
}
function updateStatus(quality){
  const status = document.getElementById('status');
  if(!quality){
    status.innerHTML = '<span class="pill">Idle</span>';
    return;
  }
  const cls = quality.confidence === 'high' ? 'good' : quality.confidence === 'medium' ? 'warn' : 'bad';
  status.innerHTML = `<span class="pill ${cls}">${esc(quality.confidence)} ${esc(quality.confidence_score)}/100</span><span class="pill">${quality.review_required ? 'Review required' : 'Ready for tuning'}</span>`;
}
function updateCount(){
  const bytes = new Blob([document.getElementById('rule').value]).size;
  document.getElementById('charCount').textContent = `${bytes} bytes`;
}
async function doConvert(){
  const rule = document.getElementById('rule').value;
  const pipeline = document.getElementById('pipeline').value;
  const backend = document.getElementById('backend').value;
  const err = document.getElementById('err');
  const btn = document.getElementById('convertBtn');
  err.style.display = 'none';
  if(!rule.trim()){
    err.textContent = 'No YARA rule provided.';
    err.style.display = 'block';
    return;
  }
  btn.disabled = true;
  try{
    const response = await fetch('/api/convert', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({rule, pipeline, backend})
    });
    const data = await response.json();
    if(!response.ok) throw new Error(data.error || 'Conversion failed');
    lastSigma = data.sigma;
    document.getElementById('out-sigma').textContent = data.sigma;
    document.getElementById('out-query').textContent = data.query;
    document.getElementById('out-report').innerHTML = data.report.map(item => `<li>${esc(item)}</li>`).join('');
    document.getElementById('metricConfidence').textContent = `${data.quality.confidence || '-'} ${data.quality.confidence_score ?? ''}`.trim();
    document.getElementById('metricPatterns').textContent = data.parsed.patterns;
    document.getElementById('metricReview').textContent = data.quality.review_required ? 'Required' : 'Normal';
    document.getElementById('metricRule').textContent = data.parsed.name || '-';
    updateStatus(data.quality);
  }catch(error){
    err.textContent = error.message;
    err.style.display = 'block';
  }finally{
    btn.disabled = false;
  }
}
function copyOut(){
  const text = document.getElementById('out-' + current).textContent;
  navigator.clipboard.writeText(text);
  const btn = document.getElementById('copyBtn');
  btn.textContent = 'Copied';
  setTimeout(() => { btn.textContent = 'Copy'; }, 1200);
}
function download(){
  if(!lastSigma) return;
  const blob = new Blob([lastSigma], {type:'text/yaml'});
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = 'converted.sigma.yml';
  link.click();
}
document.getElementById('rule').addEventListener('input', updateCount);
document.getElementById('rule').addEventListener('keydown', event => {
  if((event.ctrlKey || event.metaKey) && event.key === 'Enter') doConvert();
});
updateCount();
</script>
</body>
</html>
