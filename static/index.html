<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YARA Sigma Studio</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#eef1f4;--surface:#ffffff;--surface2:#f7f8fa;--ink:#18202a;--muted:#687282;
  --line:#d7dde5;--line2:#c5ced8;--code:#101822;--code2:#0b1119;--codeText:#d8e0ea;
  --blue:#2454d6;--blue2:#163b9a;--green:#0f8b6f;--amber:#b7791f;--red:#c0392b;
  --shadow:0 16px 48px rgba(24,32,42,.10);
}
html,body{height:100%}
body{font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--ink);line-height:1.45}
button,select,textarea{font:inherit}
button{cursor:pointer}
.app{min-height:100vh;display:grid;grid-template-rows:auto 1fr}
.top{height:58px;background:var(--surface);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 18px;gap:16px}
.brand{display:flex;align-items:center;gap:12px;min-width:0}
.mark{width:30px;height:30px;border-radius:7px;background:linear-gradient(135deg,var(--blue),var(--green));box-shadow:inset 0 0 0 1px rgba(255,255,255,.35)}
.brand h1{font-size:1rem;font-weight:800;letter-spacing:0}
.brand p{font-size:.76rem;color:var(--muted)}
.status{display:flex;gap:8px;align-items:center;justify-content:flex-end;flex-wrap:wrap}
.pill{border:1px solid var(--line);background:var(--surface2);border-radius:999px;padding:5px 9px;color:var(--muted);font-size:.74rem;white-space:nowrap}
.pill.good{color:var(--green);border-color:rgba(15,139,111,.28);background:rgba(15,139,111,.06)}
.pill.warn{color:var(--amber);border-color:rgba(183,121,31,.28);background:rgba(183,121,31,.07)}
.pill.bad{color:var(--red);border-color:rgba(192,57,43,.26);background:rgba(192,57,43,.06)}
.workspace{height:calc(100dvh - 58px);padding:12px;display:grid;grid-template-columns:minmax(340px,38%) minmax(0,1fr);gap:12px}
.panel{min-width:0;background:var(--surface);border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow);display:flex;flex-direction:column;overflow:hidden}
.panelHead{height:42px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 12px;gap:10px;background:linear-gradient(180deg,#fff,#fafbfc)}
.panelTitle{font-size:.78rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:#364150}
.counter{font-size:.76rem;color:var(--muted);white-space:nowrap}
.toolbar{padding:10px 12px;border-bottom:1px solid var(--line);display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr) auto auto;gap:8px;background:var(--surface2)}
select,.btn{height:34px;border:1px solid var(--line2);border-radius:7px;background:#fff;color:var(--ink);padding:0 9px;font-size:.84rem}
select:focus,.btn:focus,textarea:focus{outline:2px solid rgba(36,84,214,.22);outline-offset:1px}
.btn{font-weight:750;white-space:nowrap}
.btn.primary{background:var(--blue);border-color:var(--blue);color:#fff}
.btn.primary:hover{background:var(--blue2)}
.btn:disabled{opacity:.55;cursor:not-allowed}
.sourceWrap{padding:12px;display:grid;grid-template-rows:auto minmax(0,1fr) auto;gap:10px;min-height:0;flex:1}
.dropzone{border:1px dashed var(--line2);border-radius:8px;background:#fbfcfd;padding:9px 10px;display:flex;align-items:center;justify-content:space-between;gap:10px;color:var(--muted);font-size:.8rem}
.dropzone strong{color:var(--ink);font-size:.84rem}
.dropzone.drag{border-color:var(--blue);background:rgba(36,84,214,.05)}
textarea{width:100%;min-height:0;height:100%;resize:none;border:1px solid var(--line);border-radius:8px;background:var(--code);color:var(--codeText);padding:12px;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:.8rem;line-height:1.5;tab-size:2}
.samples{display:flex;gap:7px;flex-wrap:wrap}
.sample{border:1px solid var(--line);background:var(--surface2);color:#445164;border-radius:999px;padding:6px 10px;font-size:.76rem;font-weight:650}
.resultTabs{height:42px;display:flex;align-items:center;gap:4px;padding:0 8px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,#fff,#fafbfc)}
.tab{height:30px;border:0;background:transparent;border-radius:7px;color:var(--muted);padding:0 10px;font-size:.84rem;font-weight:760}
.tab.active{background:#eaf0ff;color:var(--blue)}
.actions{margin-left:auto;display:flex;gap:8px}
.summary{padding:10px 12px;display:grid;grid-template-columns:repeat(4,minmax(96px,1fr));gap:8px;border-bottom:1px solid var(--line);background:var(--surface2)}
.metric{border:1px solid var(--line);border-radius:8px;background:#fff;padding:8px 9px;min-width:0}
.metric span{display:block;color:var(--muted);font-size:.67rem;font-weight:800;text-transform:uppercase;letter-spacing:.08em}
.metric strong{display:block;margin-top:3px;font-size:.9rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.outputWrap{padding:12px;min-height:0;flex:1;display:flex;flex-direction:column}
.err{display:none;margin-bottom:12px;border:1px solid rgba(192,57,43,.24);color:#84251d;background:rgba(192,57,43,.06);padding:10px;border-radius:8px;font-size:.86rem}
.out{flex:1;min-height:0;overflow:auto;background:var(--code2);color:var(--codeText);border:1px solid #1c2b3a;border-radius:8px;padding:12px;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:.8rem;line-height:1.5;white-space:pre-wrap;word-break:break-word}
.report{font-family:inherit;list-style:none}
.report li{padding:9px 0;border-bottom:1px solid rgba(255,255,255,.08);color:#d9e0e8;font-size:.84rem}
.hidden{display:none!important}
@media(max-width:1280px){
  .top{height:auto;min-height:64px;align-items:flex-start;flex-direction:column;padding:14px 16px}
  .status{justify-content:flex-start}
  .workspace{height:auto;min-height:calc(100dvh - 64px);grid-template-columns:1fr;padding:12px}
  .panel{min-height:460px}
  .panel:first-child{min-height:560px}
  .toolbar{grid-template-columns:1fr 1fr auto auto}
  .summary{grid-template-columns:1fr 1fr}
}
@media(min-width:1281px){
  .panel{min-height:0}
}
@media(max-width:760px){
  .toolbar{grid-template-columns:1fr 1fr}
  .toolbar .btn{width:100%}
}
@media(max-width:560px){
  .toolbar,.summary{grid-template-columns:1fr}
  .dropzone{display:block}
  .dropzone span{display:block;margin-top:4px}
  .resultTabs{height:auto;align-items:flex-start;flex-wrap:wrap;padding:8px}
  .actions{margin-left:0;width:100%}
  .actions .btn{flex:1}
}
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <div class="brand">
      <div class="mark"></div>
      <div>
        <h1>YARA Sigma Studio</h1>
        <p>Convert YARA rules into Sigma and SIEM queries</p>
      </div>
    </div>
    <div class="status" id="status">
      <span class="pill">Idle</span>
    </div>
  </header>

  <main class="workspace">
    <section class="panel">
      <div class="panelHead">
        <div class="panelTitle">Source</div>
        <div class="counter" id="charCount">0 bytes</div>
      </div>
      <div class="toolbar">
        <select id="pipeline" title="Mapping pipeline">
          <option value="">Loading...</option>
        </select>
        <select id="backend" title="Query backend">
          <option value="">Loading...</option>
        </select>
        <button class="btn" type="button" onclick="pickFile()">Import .yar</button>
        <button class="btn primary" id="convertBtn" onclick="doConvert()">Convert</button>
      </div>
      <input id="fileInput" type="file" accept=".yar,.yara,.txt,.rule,text/plain" class="hidden">
      <div class="sourceWrap">
        <div class="dropzone" id="dropzone">
          <strong>Drop YARA file here</strong>
          <span id="fileName">No file loaded</span>
        </div>
        <textarea id="rule" placeholder="Paste or import a YARA rule..." spellcheck="false"></textarea>
        <div class="samples">
          <button class="sample" onclick="loadSample('basic')">Basic</button>
          <button class="sample" onclick="loadSample('c2')">C2</button>
          <button class="sample" onclick="loadSample('complex')">Complex</button>
          <button class="sample" onclick="loadSample('hash')">Hash</button>
        </div>
      </div>
    </section>

    <section class="panel">
      <div class="resultTabs">
        <button class="tab active" data-tab="sigma" onclick="switchTab('sigma')">Sigma</button>
        <button class="tab" data-tab="query" onclick="switchTab('query')">Query</button>
        <button class="tab" data-tab="report" onclick="switchTab('report')">Report</button>
        <div class="actions">
          <button class="btn" id="copyBtn" onclick="copyOut()">Copy</button>
          <button class="btn" onclick="download()">Download</button>
        </div>
      </div>
      <div class="summary">
        <div class="metric"><span>Confidence</span><strong id="metricConfidence">-</strong></div>
        <div class="metric"><span>Patterns</span><strong id="metricPatterns">-</strong></div>
        <div class="metric"><span>Review</span><strong id="metricReview">-</strong></div>
        <div class="metric"><span>Rule</span><strong id="metricRule">-</strong></div>
      </div>
      <div class="outputWrap">
        <div class="err" id="err"></div>
        <pre class="out" id="out-sigma">Conversion output will appear here.</pre>
        <pre class="out hidden" id="out-query"></pre>
        <ul class="out report hidden" id="out-report"></ul>
      </div>
    </section>
  </main>
</div>

<script>
const SAMPLES = {
  basic: `rule SuspiciousExecutable : malware {\n  meta:\n    author = "analyst"\n    description = "Detects suspicious dropper"\n    reference = "T1059.003"\n  strings:\n    $a = "cmd.exe /c"\n    $b = "powershell -enc" nocase\n  condition:\n    any of them\n}`,
  c2: `rule C2Beacon {\n  meta:\n    description = "Detects C2 beacon traffic"\n  strings:\n    $url = "http://malicious-c2.example.com/gate.php"\n    $ip  = "185.220.101.45"\n    $ua  = "Mozilla/4.0 (compatible; MSIE)"\n  condition:\n    all of them\n}`,
  complex: `rule ComplexCondition {\n  strings:\n    $a1 = "rundll32.exe"\n    $a2 = "regsvr32.exe"\n    $b = /powershell\\\\s+-e(nc)?/ nocase\n  condition:\n    1 of ($a*) and $b\n}`,
  hash: `rule KnownMalwareHash {\n  meta:\n    description = "Detects known malware by hash and path"\n  strings:\n    $h = "44d88612fea8a8f36de82e1278abb02f"\n    $p = "C:\\\\Users\\\\Public\\\\evil.exe"\n  condition:\n    any of them\n}`
};
let current = 'sigma';
let lastSigma = '';

function esc(value){
  return String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}
function loadSample(key){
  document.getElementById('rule').value = SAMPLES[key];
  document.getElementById('fileName').textContent = 'Sample loaded';
  updateCount();
}
function switchTab(tab){
  current = tab;
  document.querySelectorAll('.tab').forEach(btn => btn.classList.toggle('active', btn.dataset.tab === tab));
  ['sigma','query','report'].forEach(name => document.getElementById('out-' + name).classList.toggle('hidden', name !== tab));
}
function updateStatus(quality){
  const status = document.getElementById('status');
  if(!quality){
    status.innerHTML = '<span class="pill">Idle</span>';
    return;
  }
  const cls = quality.confidence === 'high' ? 'good' : quality.confidence === 'medium' ? 'warn' : 'bad';
  status.innerHTML = `<span class="pill ${cls}">${esc(quality.confidence)} ${esc(quality.confidence_score)}/100</span><span class="pill">${quality.review_required ? 'Review required' : 'Ready for tuning'}</span>`;
}
function updateCount(){
  const bytes = new Blob([document.getElementById('rule').value]).size;
  document.getElementById('charCount').textContent = `${bytes} bytes`;
}
function pickFile(){
  document.getElementById('fileInput').click();
}
function loadFile(file){
  const reader = new FileReader();
  reader.onload = () => {
    document.getElementById('rule').value = String(reader.result || '');
    document.getElementById('fileName').textContent = file.name;
    updateCount();
    document.getElementById('status').innerHTML = `<span class="pill good">${esc(file.name)}</span><span class="pill">Loaded</span>`;
  };
  reader.onerror = () => {
    const err = document.getElementById('err');
    err.textContent = 'Failed to read the selected file.';
    err.style.display = 'block';
  };
  reader.readAsText(file);
}
async function doConvert(){
  const rule = document.getElementById('rule').value;
  const pipeline = document.getElementById('pipeline').value;
  const backend = document.getElementById('backend').value;
  const err = document.getElementById('err');
  const btn = document.getElementById('convertBtn');
  err.style.display = 'none';
  if(!rule.trim()){
    err.textContent = 'No YARA rule provided.';
    err.style.display = 'block';
    return;
  }
  btn.disabled = true;
  try{
    const response = await fetch('/api/convert', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({rule, pipeline, backend})
    });
    const data = await response.json();
    if(!response.ok) throw new Error(data.error || 'Conversion failed');
    lastSigma = data.sigma;
    document.getElementById('out-sigma').textContent = data.sigma;
    document.getElementById('out-query').textContent = data.query || '';
    document.getElementById('out-report').innerHTML = data.report.map(item => `<li>${esc(item)}</li>`).join('');
    document.getElementById('metricConfidence').textContent = `${data.quality.confidence || '-'} ${data.quality.confidence_score ?? ''}`.trim();
    document.getElementById('metricPatterns').textContent = data.parsed.patterns;
    document.getElementById('metricReview').textContent = data.quality.review_required ? 'Required' : 'Normal';
    document.getElementById('metricRule').textContent = data.parsed.name || '-';
    updateStatus(data.quality);
  }catch(error){
    err.textContent = error.message;
    err.style.display = 'block';
  }finally{
    btn.disabled = false;
  }
}
function copyOut(){
  const text = document.getElementById('out-' + current).textContent;
  navigator.clipboard.writeText(text);
  const btn = document.getElementById('copyBtn');
  btn.textContent = 'Copied';
  setTimeout(() => { btn.textContent = 'Copy'; }, 1200);
}
function download(){
  if(!lastSigma) return;
  const blob = new Blob([lastSigma], {type:'text/yaml'});
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = 'converted.sigma.yml';
  link.click();
}
document.getElementById('rule').addEventListener('input', updateCount);
document.getElementById('fileInput').addEventListener('change', event => {
  const file = event.target.files && event.target.files[0];
  if(file) loadFile(file);
  event.target.value = '';
});
const dropzone = document.getElementById('dropzone');
dropzone.addEventListener('click', pickFile);
dropzone.addEventListener('dragover', event => {
  event.preventDefault();
  dropzone.classList.add('drag');
});
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag'));
dropzone.addEventListener('drop', event => {
  event.preventDefault();
  dropzone.classList.remove('drag');
  const file = event.dataTransfer.files && event.dataTransfer.files[0];
  if(file) loadFile(file);
});
document.getElementById('rule').addEventListener('keydown', event => {
  if((event.ctrlKey || event.metaKey) && event.key === 'Enter') doConvert();
});
updateCount();
</script>

<script>
// Load pipelines and backends from API (replaces Jinja template rendering)
fetch("/healthz")
  .then(res => res.json())
  .then(data => {
    const pipelineSelect = document.getElementById("pipeline");
    const backendSelect = document.getElementById("backend");
    
    // Clear loading options
    pipelineSelect.innerHTML = "";
    backendSelect.innerHTML = "";
    
    // Populate pipelines
    data.pipelines.forEach(p => {
      const opt = document.createElement("option");
      opt.value = p;
      opt.textContent = p;
      if (p === "sysmon") opt.selected = true;
      pipelineSelect.appendChild(opt);
    });
    
    // Populate backends
    Object.entries(data.backends).forEach(([key, name]) => {
      const opt = document.createElement("option");
      opt.value = key;
      opt.textContent = name;
      if (key === "splunk") opt.selected = true;
      backendSelect.appendChild(opt);
    });
  })
  .catch(err => {
    console.error("Failed to load config:", err);
    document.getElementById("pipeline").innerHTML = '<option value="sysmon">sysmon</option>';
    document.getElementById("backend").innerHTML = '<option value="splunk">Splunk</option>';
  });
</script>
</body>
</html>
