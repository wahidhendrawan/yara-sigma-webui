name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Tests (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install PyYAML pytest
      - name: Run tests
        run: pytest -q

  cli-smoke:
    name: CLI smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install PyYAML
      - name: Pipelines + convert + query
        run: |
          python -m yar2sig pipelines
          python -m yar2sig convert samples/malware.yar -p sysmon | head -20
          python -m yar2sig query samples/malware.yar -b splunk

  docker:
    name: Docker build + healthcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t yar2sig:ci .
      - name: Run + healthcheck
        run: |
          docker run -d --name yar2sig -p 8000:8000 yar2sig:ci
          for i in $(seq 1 15); do
            if curl -fsS http://127.0.0.1:8000/healthz; then echo "healthy"; exit 0; fi
            sleep 2
          done
          echo "::error::container did not become healthy"; docker logs yar2sig; exit 1
